<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VMPilot Pipeline Benchmark</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
           background: #0d1117; color: #c9d1d9; }
    header { padding: 24px 32px 0; }
    h1 { color: #58a6ff; font-size: 24px; margin-bottom: 4px; }
    .meta { color: #8b949e; font-size: 13px; margin-bottom: 16px; }
    .tabs { display: flex; gap: 0; padding: 0 32px; border-bottom: 2px solid #30363d; }
    .tab { padding: 10px 24px; cursor: pointer; border: 1px solid transparent;
           border-bottom: none; border-radius: 6px 6px 0 0; color: #8b949e;
           background: transparent; font-size: 14px; font-family: inherit; }
    .tab:hover { color: #c9d1d9; }
    .tab.active { color: #c9d1d9; background: #161b22; border-color: #30363d;
                  border-bottom-color: #161b22; margin-bottom: -2px; }
    iframe { width: 100%; height: calc(100vh - 120px); border: none; background: #161b22; }
  </style>
</head>
<body>
  <header>
    <h1>VMPilot Pipeline Benchmark</h1>
    <p class="meta">12-phase FPE ratchet pipeline &mdash; per-opcode ns/insn, handler overhead, IPS</p>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="show('linux',this)">Linux (GCC 14)</button>
    <button class="tab" onclick="show('windows',this)">Windows (MSVC)</button>
    <button class="tab" onclick="show('macos',this)">macOS (Apple Clang)</button>
  </div>
  <iframe id="frame" src="bench/linux/index.html"></iframe>
  <script>
    function show(platform, el) {
      document.getElementById('frame').src = 'bench/' + platform + '/index.html';
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      el.classList.add('active');
    }
  </script>
</body>
</html>
