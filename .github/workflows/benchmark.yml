name: Benchmark

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # push to gh-pages
  pull-requests: write   # post PR comments

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            generator: Ninja
            cmake_args: >-
              -DCMAKE_BUILD_TYPE=Release
              -DCMAKE_C_COMPILER=gcc-14
              -DCMAKE_CXX_COMPILER=g++-14
            build_args: ""
            bin: ./build/bin/vmpilot_bench
            platform: linux
          - os: macos-latest
            generator: Ninja
            cmake_args: "-DCMAKE_BUILD_TYPE=Release"
            build_args: ""
            bin: ./build/bin/vmpilot_bench
            platform: macos
          - os: windows-latest
            generator: "Visual Studio 17 2022"
            # CMAKE_BUILD_TYPE is set explicitly even though VS is a
            # multi-config generator: the Botan ExternalProject picks
            # --msvc-runtime at configure time, and without this flag
            # common/crypto/src/CMakeLists.txt defaults to MDd (Debug),
            # which then LNK2038s against the --config Release bench.
            cmake_args: "-A x64 -DCMAKE_BUILD_TYPE=Release"
            build_args: "--config Release"
            bin: ./build/bin/Release/vmpilot_bench.exe
            platform: windows

    runs-on: ${{ matrix.os }}
    name: bench (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Submodules ──
      - name: Compute submodule cache key
        id: submod-hash
        shell: bash
        run: |
          echo "hash=$(git ls-tree HEAD third_party common/crypto | git hash-object --stdin)" >> "$GITHUB_OUTPUT"

      - name: Restore submodule cache
        id: cache-submodules
        uses: actions/cache/restore@v4
        with:
          path: |
            third_party
            common/crypto
          key: submodules-${{ runner.os }}-${{ steps.submod-hash.outputs.hash }}

      - name: Init submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive --depth 1

      - name: Verify submodules
        shell: bash
        run: |
          if [ ! -f third_party/capstone/CMakeLists.txt ]; then
            echo "::warning::Submodule cache was empty, re-initializing"
            git submodule update --init --recursive --depth 1
          fi

      # Save submodule cache NOW, before the deinit step later wipes them
      - name: Save submodule cache
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            third_party
            common/crypto
          key: submodules-${{ runner.os }}-${{ steps.submod-hash.outputs.hash }}

      # ── CPM cache ──
      - name: Cache CPM
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cpm-bench-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'sdk/src/CMakeLists.txt') }}
          restore-keys: cpm-bench-${{ runner.os }}-

      # ── Install Ninja ──
      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      # ── Build ──
      - name: Configure
        shell: bash
        run: |
          cmake -B build \
            -G "${{ matrix.generator }}" \
            ${{ matrix.cmake_args }} \
            -DVMPILOT_ENABLE_BENCHMARKS=ON

      - name: Build
        run: cmake --build build ${{ matrix.build_args }} --target vmpilot_bench -j

      # ── Install Python Dependencies ──
      - name: Install Python Dependencies
        shell: bash
        run: python3 -m pip install numpy scipy --break-system-packages

      # ── Run benchmark ──
      - name: Run benchmark
        shell: bash
        run: ${{ matrix.bin }} --iterations=110 --dus=125 --policy=all > bench_raw.json

      - name: Analyze and Filter
        continue-on-error: true # TODO(#16): fix the side channel attacks
        shell: bash
        run: |
          python3 scripts/bench_analyzer.py bench_raw.json --fail-on-leak > bench_clean.json
          echo "=== Security Metrics Report ==="
          python3 -c "
          import json, sys
          try:
              data = json.load(open('bench_clean.json'))
              results = data if isinstance(data, list) else [data]
              for r in results:
                  p = r.get('metadata', {}).get('policy', 'Unknown')
                  sec = r.get('security_metrics', {})
                  if not sec: continue
                  print(f'Policy: {p}')
                  print(f'  ANOVA p-value: {sec.get(\"anova_p_value\")}')
                  print(f'  ANOVA F-stat:  {sec.get(\"anova_f_stat\")}')
                  print(f'  Leakage bits:  {sec.get(\"leakage_bits\")}\n')

                  diag = r.get('diagnostics', {})
                  print('  Top opcode deltas:')
                  for row in diag.get('top_delta_opcodes', [])[:5]:
                      print(
                          f'    {row.get(\"name\", row.get(\"opcode\", \"?\"))}: '
                          f'ns/DU={row.get(\"ns_per_du\")!r} '
                          f'delta={row.get(\"delta_ns\"):+.17g} '
                          f'stddev={row.get(\"stddev_ns\")!r} '
                          f'n={row.get(\"iterations\")}'
                      )
                  print('  Category spans:')
                  for row in diag.get('category_summary', []):
                      print(
                          f'    cat{row.get(\"category\")}: '
                          f'mean={row.get(\"mean_ns_per_du\")!r} '
                          f'span={row.get(\"span_ns_per_du\")!r} '
                          f'min={row.get(\"min_ns_per_du\")!r} '
                          f'max={row.get(\"max_ns_per_du\")!r}'
                      )
                  print()
          except Exception as e:
              print(f'Error reading metrics: {e}')
          "

      # ── Upload raw + clean result ──
      - name: Upload benchmark JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.platform }}
          path: |
            bench_raw.json
            bench_clean.json
          if-no-files-found: warn

      # ── Store in gh-pages (push to main/dev only — becomes baseline) ──
      - name: Convert for chart
        if: github.event_name == 'push'
        shell: bash
        run: python3 scripts/bench_to_chart.py bench_clean.json > bench_chart.json

      # Deinit submodules so github-action-benchmark can switch to gh-pages
      # without hitting "fatal: not a git repository: .git/modules/..."
      - name: Deinit submodules for gh-pages switch
        if: github.event_name == 'push'
        shell: bash
        run: git submodule deinit --all --force 2>/dev/null || true

      - name: Publish to GitHub Pages
        if: github.event_name == 'push'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ matrix.platform }}
          tool: customSmallerIsBetter
          output-file-path: bench_chart.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          benchmark-data-dir-path: bench/${{ matrix.platform }}
          comment-on-alert: false
          fail-on-alert: false
          max-items-in-chart: 300

  # ── PR comment with comparison table ──
  comment:
    if: github.event_name == 'pull_request'
    needs: bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Download all platform results
      - uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          merge-multiple: false

      # Fetch baselines from gh-pages
      - name: Fetch baselines
        shell: bash
        run: |
          mkdir -p baselines
          for p in linux macos windows; do
            # Try to download the latest raw JSON stored in gh-pages
            # The benchmark-action stores chart data, not raw JSON.
            # So we use the artifact from the latest main/dev run instead.
            echo "{}" > baselines/${p}.json
          done
          # Try to get baseline artifacts from latest dev/main run
          gh run list --branch dev --workflow Benchmark --status completed --limit 1 --json databaseId -q '.[0].databaseId' > /tmp/run_id.txt || true
          RUN_ID=$(cat /tmp/run_id.txt)
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            for p in linux macos windows; do
              gh run download "$RUN_ID" --name "bench-${p}" --dir "baselines/${p}_dl" 2>/dev/null || true
              if [ -f "baselines/${p}_dl/bench_clean.json" ]; then
                cp "baselines/${p}_dl/bench_clean.json" "baselines/${p}.json"
              elif [ -f "baselines/${p}_dl/bench_raw.json" ]; then
                cp "baselines/${p}_dl/bench_raw.json" "baselines/${p}.json"
              fi
            done
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Generate markdown comparison
      - name: Generate comparison
        shell: bash
        run: |
          echo "## Pipeline Benchmark" > comment.md
          echo "" >> comment.md
          for p in linux macos windows; do
            # The current branch will output bench_clean.json
            if [ -f "bench-${p}/bench_clean.json" ]; then
              BASE_ARG=""
              if [ -s "baselines/${p}.json" ] && [ "$(cat baselines/${p}.json)" != "{}" ]; then
                BASE_ARG="--baseline baselines/${p}.json"
              fi
              python3 scripts/bench_compare.py \
                --current "bench-${p}/bench_clean.json" \
                $BASE_ARG \
                --platform "${p}" >> comment.md
              echo "" >> comment.md
            fi
          done
          echo "" >> comment.md
          echo "_Commit: \`$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-8)\` | Evaluated multiple policies_" >> comment.md

      # Post / update PR comment
      - name: Post PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          comment-tag: benchmark-results
