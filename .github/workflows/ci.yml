name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: MSVC
            os: windows-latest
            generator: "Visual Studio 17 2022"
            cmake_args: "-A x64"
            build_args: "--config Debug"
            test_args: "-C Debug"

          - name: GCC 14
            os: ubuntu-latest
            generator: Ninja
            cmake_args: >-
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_C_COMPILER=gcc-14
              -DCMAKE_CXX_COMPILER=g++-14
            build_args: ""
            test_args: ""

          - name: Clang 18
            os: ubuntu-latest
            generator: Ninja
            cmake_args: >-
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_C_COMPILER=clang-18
              -DCMAKE_CXX_COMPILER=clang++-18
            build_args: ""
            test_args: ""

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout (shallow, no submodules — we cache them separately) ──
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Cache submodules (third_party + common/crypto) ──
      # Key is derived from the exact submodule commit hashes recorded in
      # the git tree.  If any submodule pin changes, the key changes.
      - name: Compute submodule cache key
        id: submod-hash
        shell: bash
        run: |
          echo "hash=$(git ls-tree HEAD third_party common/crypto | git hash-object --stdin)" >> "$GITHUB_OUTPUT"

      - name: Cache submodules
        id: cache-submodules
        uses: actions/cache@v4
        with:
          path: |
            third_party
            common/crypto
          key: submodules-${{ runner.os }}-${{ steps.submod-hash.outputs.hash }}

      - name: Init submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive --depth 1

      # ── Cache CPM downloads (ELFIO, COFFI, spdlog, toml++, gtest) ──
      - name: Cache CPM
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cpm-${{ runner.os }}-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', 'sdk/src/CMakeLists.txt') }}
          restore-keys: |
            cpm-${{ runner.os }}-${{ matrix.name }}-

      # ── Install Ninja (Linux only — Windows runners already have it) ──
      - name: Install Ninja
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      # ── Configure ──
      - name: Configure
        shell: bash
        run: |
          cmake -B build \
            -G "${{ matrix.generator }}" \
            ${{ matrix.cmake_args }} \
            -DENABLE_TESTS=ON

      # ── Build ──
      - name: Build
        run: cmake --build build ${{ matrix.build_args }} -j

      # ── Test ──
      - name: Test
        run: ctest --test-dir build ${{ matrix.test_args }} --output-on-failure
